services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: expert_service
      POSTGRES_USER: expert
      POSTGRES_PASSWORD: expert_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./expert_service/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  service:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://expert:expert_dev@postgres:5432/expert_service
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    depends_on:
      - postgres

volumes:
  pgdata:

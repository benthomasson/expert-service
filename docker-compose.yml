services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: expert_service
      POSTGRES_USER: expert
      POSTGRES_PASSWORD: expert_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./expert_service/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  service:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://expert:expert_dev@postgres:5432/expert_service
      DATABASE_URL_SYNC: postgresql+psycopg://expert:expert_dev@postgres:5432/expert_service
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/application_default_credentials.json
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/gcp/application_default_credentials.json:ro
    depends_on:
      - postgres

volumes:
  pgdata:

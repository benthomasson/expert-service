<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Expert Service{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; }
        .stat-card { text-align: center; padding: 1rem; background: var(--pico-card-background-color); border-radius: var(--pico-border-radius); }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { font-size: 0.85rem; color: var(--pico-muted-color); }
        .pipeline-steps { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        .pipeline-step { padding: 0.5rem 1rem; border-radius: var(--pico-border-radius); font-size: 0.85rem; }
        .pipeline-step.done { background: #d4edda; color: #155724; }
        .pipeline-step.active { background: #fff3cd; color: #856404; }
        .pipeline-step.pending { background: #e2e3e5; color: #383d41; }
        .belief-row { padding: 1rem; margin-bottom: 0.5rem; border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); }
        .belief-row .belief-id { font-family: monospace; font-weight: bold; }
        .belief-row .belief-source { font-size: 0.8rem; color: var(--pico-muted-color); }
        nav .brand { font-weight: bold; font-size: 1.2rem; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="container">
        <ul><li><a href="/" class="brand">Expert Service</a></li></ul>
        <ul><li><a href="/">Projects</a></li><li><a href="/meta/chat">Meta-Expert</a></li></ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>Expert Service v0.1.0 — Built with LangGraph + FastAPI</small>
    </footer>
</body>
</html>

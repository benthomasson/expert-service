{% extends "base.html" %}

{% block title %}Chat — {{ project.name }} — Expert Service{% endblock %}

{% block extra_head %}
<style>
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .chat-messages {
        flex: 1; overflow-y: auto; padding: 1rem;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        margin-bottom: 1rem;
    }
    .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 0.5rem; max-width: 85%; }
    .message.user { background: var(--pico-primary-background); margin-left: auto; }
    .message.assistant { background: var(--pico-card-background-color); margin-right: auto; }
    .message .role { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 0.25rem; color: var(--pico-muted-color); }
    .message .content { white-space: pre-wrap; word-break: break-word; }
    .tool-indicator { font-size: 0.8rem; color: var(--pico-muted-color); font-style: italic; padding: 0.25rem 1rem; margin-right: auto; max-width: 85%; }
    .chat-input { display: flex; gap: 0.5rem; }
    .chat-input input { flex: 1; margin-bottom: 0; }
    .chat-input button { margin-bottom: 0; white-space: nowrap; }
    #model-select { width: auto; margin-bottom: 0; padding: 0.4rem 0.8rem; font-size: 0.85rem; }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div>
            <a href="/projects/{{ project.id }}">&larr; {{ project.name }}</a>
            <h3 style="margin:0.25rem 0 0 0">Chat with {{ project.domain }} Expert</h3>
        </div>
        <select id="model-select">
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="claude-sonnet-4-5@20250929">Claude Sonnet 4.5</option>
        </select>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Ask about {{ project.domain }}..." autofocus>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const projectId = "{{ project.id }}";
const threadId = crypto.randomUUID();
let sending = false;

document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
    div.querySelector('.content').textContent = text;
    messages.appendChild(div);
    scrollToBottom();
    return div.querySelector('.content');
}

function appendToolIndicator(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'tool-indicator';
    div.textContent = text;
    messages.appendChild(div);
    scrollToBottom();
}

async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;

    sending = true;
    input.value = '';
    document.getElementById('send-btn').setAttribute('aria-busy', 'true');

    appendMessage('user', message);

    // Don't create assistant bubble yet — wait for first token
    let contentEl = null;

    try {
        const response = await fetch(`/api/projects/${projectId}/chat`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                message: message,
                model: document.getElementById('model-select').value,
                thread_id: threadId,
            }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream: true});

            const lines = buffer.split('\n');
            buffer = lines.pop();

            let eventType = null;
            for (const line of lines) {
                if (line.startsWith('event: ')) {
                    eventType = line.slice(7).trim();
                } else if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));
                        if (eventType === 'tool_call') {
                            appendToolIndicator(`Using tool: ${data.name}...`);
                        } else if (eventType === 'tool_result') {
                            // Tool result received, LLM will continue
                        } else if (eventType === 'done') {
                            // Stream complete
                        } else if (data.type === 'token') {
                            // Create assistant bubble on first token
                            if (!contentEl) {
                                contentEl = appendMessage('assistant', '');
                            }
                            contentEl.textContent += data.content;
                            scrollToBottom();
                        }
                    } catch (e) {
                        // Skip malformed JSON
                    }
                    eventType = null;
                }
            }
        }
    } catch (err) {
        if (!contentEl) {
            contentEl = appendMessage('assistant', '');
        }
        contentEl.textContent = `Error: ${err.message}`;
    }

    sending = false;
    document.getElementById('send-btn').removeAttribute('aria-busy');
    input.focus();
}
</script>
{% endblock %}
